<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whiteboard</title>
<link rel="stylesheet" href="https://esm.sh/@excalidraw/excalidraw@0.18.0/dist/dev/index.css">
<script>
  window.EXCALIDRAW_ASSET_PATH = "https://esm.sh/@excalidraw/excalidraw@0.18.0/dist/prod/";
</script>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "react-dom": "https://esm.sh/react-dom@18.3.1"
  }
}
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body, #app { width: 100%; height: 100%; overflow: hidden; }
  .excalidraw .App-menu_top .buttonList { display: flex; }
  #loading { color: #888; font-family: sans-serif; font-size: 14px; display: flex;
    align-items: center; justify-content: center; height: 100%; background: #1e1e1e; }
</style>
</head>
<body>
<div id="app"><div id="loading">Loading whiteboard...</div></div>
<script type="module">
import * as ExcalidrawLib from "https://esm.sh/@excalidraw/excalidraw@0.18.0/dist/dev/index.js?external=react,react-dom";
import React from "https://esm.sh/react@18.3.1";
import ReactDOM from "https://esm.sh/react-dom@18.3.1";

const { Excalidraw } = ExcalidrawLib;

let excalidrawAPI = null;
let changeTimer = null;
let ready = false;

window.addEventListener("message", (e) => {
  if (!e.data || !e.data.type) return;
  if (e.data.type === "load" && excalidrawAPI) {
    const scene = e.data.scene;
    if (scene && scene.elements && scene.elements.length > 0) {
      excalidrawAPI.updateScene({ elements: scene.elements, appState: scene.appState || {} });
    } else {
      excalidrawAPI.resetScene();
    }
  }
});

const App = () => {
  return React.createElement(
    "div",
    { style: { width: "100%", height: "100vh" } },
    React.createElement(Excalidraw, {
      excalidrawAPI: (api) => {
        excalidrawAPI = api;
        if (!ready) {
          ready = true;
          const loadEl = document.getElementById("loading");
          if (loadEl) loadEl.remove();
          window.parent.postMessage({ type: "ready" }, "*");
        }
      },
      theme: "dark",
      onChange: () => {
        if (!ready) return;
        clearTimeout(changeTimer);
        changeTimer = setTimeout(() => {
          if (!excalidrawAPI) return;
          const elements = excalidrawAPI.getSceneElements();
          const appState = excalidrawAPI.getAppState();
          window.parent.postMessage({
            type: "change",
            scene: {
              elements: JSON.parse(JSON.stringify(elements)),
              appState: {
                viewBackgroundColor: appState.viewBackgroundColor,
              },
            },
          }, "*");
        }, 1500);
      },
    })
  );
};

const root = ReactDOM.createRoot(document.getElementById("app"));
root.render(React.createElement(App));
</script>
<script>
// Fallback: if module takes too long, hint at possible issue
setTimeout(function() {
  var el = document.getElementById("loading");
  if (el) el.textContent = "Still loading... check browser console (F12) for errors";
}, 20000);
</script>
</body>
</html>
